<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #080808;
      --bg2:        #0e0e0e;
      --surface:    #141414;
      --surface2:   #1c1c1c;
      --border:     rgba(255,255,255,0.07);
      --border2:    rgba(255,255,255,0.12);
      --accent:     #c8f55a;
      --text:       #f0f0f0;
      --text-muted: rgba(240,240,240,0.4);
      --danger:     #ff5555;
      --danger-bg:  rgba(255,85,85,0.08);
      --success:    #c8f55a;
      --sidebar-w:  220px;
      --transition: 0.35s cubic-bezier(.16,1,.3,1);
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'DM Sans', 'Noto Sans Thai', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== LOGIN ===== */
    .login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      position: relative; overflow: hidden;
    }
    .login-screen::before {
      content: 'ADMIN';
      position: absolute;
      font-family: var(--font-display);
      font-size: 30vw; line-height: 1;
      color: rgba(255,255,255,0.02);
      pointer-events: none; user-select: none;
      letter-spacing: -.02em;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 3rem 2.8rem;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 2rem; letter-spacing: .18em;
      text-align: center; margin-bottom: .3rem;
      color: var(--text);
    }
    .login-sub {
      font-size: 0.65rem; letter-spacing: .22em; text-transform: uppercase;
      text-align: center; color: var(--accent);
      margin-bottom: 2.5rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block; font-size: 0.65rem; letter-spacing: .16em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: .45rem;
    }
    .form-input {
      width: 100%; padding: .7rem .9rem;
      border: 1px solid var(--border2);
      background: var(--bg2);
      font-family: var(--font-body); font-size: .9rem;
      color: var(--text); outline: none;
      transition: border-color var(--transition);
    }
    .form-input::placeholder { color: rgba(240,240,240,0.2); }
    .form-input:focus { border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .65rem 1.4rem;
      border: none; font-family: var(--font-body);
      font-size: 0.75rem; letter-spacing: .12em; text-transform: uppercase;
      cursor: pointer; transition: all var(--transition);
    }
    .btn-primary {
      background: var(--accent); color: var(--bg); width: 100%;
      font-weight: 600;
    }
    .btn-primary:hover { background: #d4ff6e; }
    .btn-secondary {
      background: var(--surface2); color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--border2); color: var(--text); }
    .btn-danger {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid rgba(255,85,85,0.15);
      font-size: 0.7rem; padding: .35rem .9rem;
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: .38rem 1rem; font-size: 0.7rem; }
    .login-error {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid rgba(255,85,85,0.2);
      padding: .6rem 1rem; font-size: .8rem; margin-bottom: 1rem; display: none;
    }
    .login-hint {
      font-size: 0.68rem; color: var(--text-muted); text-align: center; margin-top: 1.2rem;
    }

    /* ===== ADMIN LAYOUT ===== */
    .admin-wrap { display: none; min-height: 100vh; }
    .admin-wrap.visible { display: flex; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 1.8rem 1.5rem 1.4rem;
      font-family: var(--font-display);
      font-size: 1.2rem; letter-spacing: .14em;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .sidebar-logo span {
      display: block; font-size: 0.6rem; letter-spacing: .2em;
      color: var(--accent); margin-top: .2rem;
      font-family: var(--font-body); font-weight: 400;
    }
    .sidebar-nav { padding: 1.2rem 0; flex: 1; }
    .sidebar-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem 1.5rem;
      font-size: 0.75rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-muted); cursor: pointer;
      transition: all var(--transition);
      border-left: 1px solid transparent;
    }
    .sidebar-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .sidebar-item.active {
      color: var(--accent); border-left-color: var(--accent);
      background: rgba(200,245,90,0.04);
    }
    .sidebar-icon { font-size: .9rem; opacity: .7; }
    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .logout-btn {
      display: flex; align-items: center; gap: .6rem;
      color: var(--text-muted); cursor: pointer;
      font-size: 0.72rem; letter-spacing: .1em; text-transform: uppercase;
      background: none; border: none; font-family: var(--font-body);
      padding: 0; width: 100%; transition: color .3s;
    }
    .logout-btn:hover { color: var(--danger); }

    .admin-main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
    .admin-topbar {
      background: var(--surface);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 1.3rem; letter-spacing: .08em;
    }
    .topbar-actions { display: flex; gap: .8rem; align-items: center; }
    .admin-content { padding: 2rem; flex: 1; }

    /* ===== PANELS ===== */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ===== STATS ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1px; margin-bottom: 2rem;
      border: 1px solid var(--border);
      background: var(--border);
    }
    .stat-card {
      background: var(--surface);
      padding: 1.4rem 1.6rem;
    }
    .stat-card-num {
      font-family: var(--font-display);
      font-size: 2.8rem; letter-spacing: .04em;
      color: var(--accent); line-height: 1; margin-bottom: .2rem;
    }
    .stat-card-label {
      font-size: 0.65rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ===== TABLE ===== */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .table-toolbar {
      padding: 1rem 1.4rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); gap: 1rem; flex-wrap: wrap;
    }
    .table-label {
      font-size: 0.7rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .search-input {
      padding: .45rem .9rem;
      border: 1px solid var(--border2);
      background: var(--bg2); font-family: var(--font-body);
      font-size: 0.82rem; width: 200px; outline: none;
      color: var(--text); transition: border-color .3s;
    }
    .search-input::placeholder { color: rgba(240,240,240,0.2); }
    .search-input:focus { border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--bg2); }
    th {
      text-align: left; padding: .6rem 1rem;
      font-size: 0.62rem; letter-spacing: .16em; text-transform: uppercase;
      color: var(--text-muted); font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    td { padding: .8rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .td-thumb {
      width: 44px; height: 32px;
      background: var(--bg2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; overflow: hidden; color: var(--text-muted);
    }
    .td-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .td-title { font-weight: 500; font-size: .88rem; color: var(--text); }
    .td-desc {
      font-size: 0.75rem; color: var(--text-muted);
      max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .badge {
      display: inline-block; padding: .18rem .6rem;
      font-size: 0.62rem; letter-spacing: .1em; text-transform: uppercase;
      border: 1px solid;
    }
    .badge-design { color: var(--accent); border-color: rgba(200,245,90,0.2); background: rgba(200,245,90,0.05); }
    .badge-photo  { color: #7bb8f5; border-color: rgba(123,184,245,0.2); background: rgba(123,184,245,0.05); }
    .badge-art    { color: #d4a2ff; border-color: rgba(212,162,255,0.2); background: rgba(212,162,255,0.05); }
    .td-actions { display: flex; gap: .5rem; }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(8,8,8,0.9); backdrop-filter: blur(16px);
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 2rem 2.2rem 2.2rem;
      max-width: 520px; width: 100%;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.6rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.5rem; letter-spacing: .06em;
    }
    .modal-close {
      background: var(--bg2); border: 1px solid var(--border);
      width: 30px; height: 30px; font-size: .8rem; cursor: pointer;
      color: var(--text-muted); display: flex; align-items: center; justify-content: center;
      transition: all .3s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-select {
      width: 100%; padding: .65rem .9rem;
      border: 1px solid var(--border2); background: var(--bg2);
      font-family: var(--font-body); font-size: .88rem;
      color: var(--text); outline: none; appearance: none;
      transition: border-color .3s;
    }
    .form-select:focus { border-color: var(--accent); }
    .form-textarea {
      width: 100%; padding: .7rem .9rem;
      border: 1px solid var(--border2); background: var(--bg2);
      font-family: var(--font-body); font-size: .88rem;
      color: var(--text); outline: none; resize: vertical; min-height: 90px;
      transition: border-color .3s;
    }
    .form-textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: .8rem; justify-content: flex-end; margin-top: 1.5rem; }
    .emoji-picker { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .5rem; }
    .emoji-opt {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; cursor: pointer; transition: all .3s;
      color: var(--text-muted);
    }
    .emoji-opt:hover, .emoji-opt.selected {
      border-color: var(--accent); background: rgba(200,245,90,0.06); color: var(--text);
    }

    /* ===== SETTINGS ===== */
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.8rem;
      max-width: 480px; margin-bottom: 1rem;
    }
    .settings-card h3 {
      font-family: var(--font-display);
      font-size: 1.3rem; letter-spacing: .06em;
      margin-bottom: 1.2rem; padding-bottom: .8rem;
      border-bottom: 1px solid var(--border); color: var(--text);
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2);
      padding: .8rem 1.4rem;
      font-size: 0.8rem; letter-spacing: .04em;
      transform: translateY(20px); opacity: 0;
      transition: all .35s var(--transition);
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 2px solid var(--accent); }
    .toast.error { border-left: 2px solid var(--danger); }

    /* ===== NOISE ===== */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 9997;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: .02; pointer-events: none;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform var(--transition); }
      .sidebar.open { transform: translateX(0); }
      .admin-main { margin-left: 0; }
      .form-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .mobile-menu-btn { display: flex !important; }
    }
    .mobile-menu-btn {
      display: none; background: none; border: none; cursor: pointer;
      flex-direction: column; gap: 5px; padding: 4px;
    }
    .mobile-menu-btn span { display: block; width: 20px; height: 1px; background: var(--text); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">PORTFOLIO</div>
    <div class="login-sub">Admin Panel</div>
    <div class="login-error" id="login-error">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-input" id="login-user" placeholder="admin" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" onclick="doLogin()">เข้าสู่ระบบ</button>
    <p class="login-hint">Default: admin / admin1234</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="admin-wrap">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      PORTFOLIO
      <span>Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-item active" data-panel="dashboard" onclick="switchPanel('dashboard', this)">
        <span class="sidebar-icon">◈</span> แดชบอร์ด
      </div>
      <div class="sidebar-item" data-panel="works" onclick="switchPanel('works', this)">
        <span class="sidebar-icon">✦</span> จัดการผลงาน
      </div>
      <div class="sidebar-item" data-panel="settings" onclick="switchPanel('settings', this)">
        <span class="sidebar-icon">⚙</span> ตั้งค่า
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">⎋ ออกจากระบบ</button>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleSidebar()">
          <span></span><span></span><span></span>
        </button>
        <span class="topbar-title" id="panel-title">DASHBOARD</span>
      </div>
      <div class="topbar-actions">
        <a href="index.html" class="btn btn-secondary btn-sm" target="_blank">← View Site</a>
      </div>
    </div>

    <div class="admin-content">

      <!-- DASHBOARD -->
      <div class="panel active" id="panel-dashboard">
        <div class="stats-row" id="stats-row"></div>
        <div class="table-wrap">
          <div class="table-toolbar">
            <span class="table-label">ผลงานล่าสุด</span>
            <button class="btn btn-primary btn-sm" onclick="openModal()">+ เพิ่มผลงาน</button>
          </div>
          <table>
            <thead>
              <tr>
                <th></th>
                <th>ชื่อผลงาน</th>
                <th>หมวดหมู่</th>
                <th>ปี</th>
              </tr>
            </thead>
            <tbody id="dash-table-body"></tbody>
          </table>
        </div>
      </div>

      <!-- WORKS -->
      <div class="panel" id="panel-works">
        <div class="table-wrap">
          <div class="table-toolbar">
            <input type="text" class="search-input" placeholder="ค้นหาผลงาน…" id="search-box" oninput="renderTable()" />
            <button class="btn btn-primary btn-sm" onclick="openModal()">+ เพิ่มผลงาน</button>
          </div>
          <table>
            <thead>
              <tr>
                <th></th>
                <th>ชื่อผลงาน</th>
                <th>หมวดหมู่</th>
                <th>ปี</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="works-table-body"></tbody>
          </table>
        </div>
      </div>

      <!-- SETTINGS -->
      <div class="panel" id="panel-settings">
        <div class="settings-card">
          <h3>เปลี่ยนรหัสผ่าน</h3>
          <div class="form-group">
            <label class="form-label">รหัสผ่านปัจจุบัน</label>
            <input type="password" class="form-input" id="old-pass" />
          </div>
          <div class="form-group">
            <label class="form-label">รหัสผ่านใหม่</label>
            <input type="password" class="form-input" id="new-pass" />
          </div>
          <div class="form-group">
            <label class="form-label">ยืนยันรหัสผ่านใหม่</label>
            <input type="password" class="form-input" id="confirm-pass" />
          </div>
          <button class="btn btn-primary" onclick="changePassword()" style="width:auto;">บันทึกรหัสผ่าน</button>
        </div>
        <div class="settings-card">
          <h3>บัญชีผู้ใช้</h3>
          <p style="font-size:.82rem;color:var(--text-muted);">Username: <strong id="current-user-display" style="color:var(--text);"></strong></p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">เพิ่มผลงาน</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label class="form-label">ชื่อผลงาน *</label>
      <input type="text" class="form-input" id="f-title" placeholder="ชื่อผลงาน" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">หมวดหมู่ *</label>
        <select class="form-select" id="f-cat">
          <option value="design">ออกแบบ</option>
          <option value="photo">ภาพถ่าย</option>
          <option value="art">ศิลปะ</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ปี</label>
        <input type="text" class="form-input" id="f-year" placeholder="2024" maxlength="4" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">คำอธิบาย</label>
      <textarea class="form-textarea" id="f-desc" placeholder="อธิบายผลงานโดยย่อ"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">URL รูปภาพ (ถ้ามี)</label>
      <input type="text" class="form-input" id="f-image" placeholder="https://..." />
    </div>
    <div class="form-group">
      <label class="form-label">ไอคอน</label>
      <div class="emoji-picker" id="emoji-picker">
        <div class="emoji-opt selected" data-v="✦">✦</div>
        <div class="emoji-opt" data-v="◈">◈</div>
        <div class="emoji-opt" data-v="◉">◉</div>
        <div class="emoji-opt" data-v="◌">◌</div>
        <div class="emoji-opt" data-v="◎">◎</div>
        <div class="emoji-opt" data-v="☀">☀</div>
        <div class="emoji-opt" data-v="❋">❋</div>
        <div class="emoji-opt" data-v="✿">✿</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveWork()">บันทึก</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="nav.js"></script>
<script>
  // ===== AUTH =====
  const DEFAULT_CREDS = { user: 'admin', pass: 'admin1234' };

  function getCreds() {
    try { return JSON.parse(localStorage.getItem('admin_creds')) || DEFAULT_CREDS; }
    catch { return DEFAULT_CREDS; }
  }
  function isLoggedIn() { return sessionStorage.getItem('admin_logged') === '1'; }

  function doLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    const creds = getCreds();
    const errEl = document.getElementById('login-error');
    if (u === creds.user && p === creds.pass) {
      sessionStorage.setItem('admin_logged', '1');
      sessionStorage.setItem('admin_user', u);
      errEl.style.display = 'none';
      showAdmin();
    } else { errEl.style.display = 'block'; }
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    sessionStorage.removeItem('admin_logged');
    document.getElementById('admin-wrap').classList.remove('visible');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-pass').value = '';
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-wrap').classList.add('visible');
    const u = sessionStorage.getItem('admin_user') || 'admin';
    document.getElementById('current-user-display').textContent = u;
    renderStats(); renderTable(); renderDashTable();
  }

  if (isLoggedIn()) showAdmin();

  // ===== DATA =====
  const SAMPLE_DATA = [
    { id: 1, title: "Brand Identity Vol.1", category: "design", desc: "การออกแบบอัตลักษณ์แบรนด์สำหรับธุรกิจขนาดเล็ก โดยใช้โทนสีธรรมชาติและตัวอักษรคลาสสิก", year: "2024", emoji: "◈" },
    { id: 2, title: "Golden Hour", category: "photo", desc: "ชุดภาพถ่ายในช่วงเวลาทองของวัน ที่ดึงเอาแสงและเงาออกมาอย่างนุ่มนวล", year: "2024", emoji: "☀" },
    { id: 3, title: "Forest Study", category: "art", desc: "ผลงานจิตรกรรมน้ำมันที่บันทึกความงามของป่าในฤดูใบไม้ร่วง", year: "2023", emoji: "✦" },
    { id: 4, title: "Packaging Design", category: "design", desc: "ออกแบบบรรจุภัณฑ์สำหรับผลิตภัณฑ์ออร์แกนิก เน้นความเรียบง่ายและเป็นมิตรกับสิ่งแวดล้อม", year: "2024", emoji: "◉" },
    { id: 5, title: "Quiet Morning", category: "photo", desc: "บรรยากาศเงียบสงบของเช้าวันใหม่ผ่านเลนส์ฟิล์ม", year: "2023", emoji: "◌" },
    { id: 6, title: "Ceramic Series", category: "art", desc: "งานเซรามิกที่ได้แรงบันดาลใจจากรูปทรงอินทรีย์ของก้อนหิน", year: "2024", emoji: "◎" },
  ];

  function getWorks() {
    try { const s = localStorage.getItem('portfolio_works'); return s ? JSON.parse(s) : SAMPLE_DATA; }
    catch { return SAMPLE_DATA; }
  }
  function saveWorks(arr) { localStorage.setItem('portfolio_works', JSON.stringify(arr)); }

  // ===== PANELS =====
  const PANEL_LABELS = { dashboard: 'DASHBOARD', works: 'WORKS', settings: 'SETTINGS' };
  function switchPanel(id, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    el.classList.add('active');
    document.getElementById('panel-title').textContent = PANEL_LABELS[id];
    if (id === 'works') renderTable();
    if (id === 'dashboard') { renderStats(); renderDashTable(); }
    document.getElementById('sidebar').classList.remove('open');
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  // ===== STATS =====
  function renderStats() {
    const works = getWorks();
    const cats = { design: 0, photo: 0, art: 0 };
    works.forEach(w => { if (cats[w.category] !== undefined) cats[w.category]++; });
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-card-num">${works.length}</div><div class="stat-card-label">ผลงานทั้งหมด</div></div>
      <div class="stat-card"><div class="stat-card-num">${cats.design}</div><div class="stat-card-label">งานออกแบบ</div></div>
      <div class="stat-card"><div class="stat-card-num">${cats.photo}</div><div class="stat-card-label">ภาพถ่าย</div></div>
      <div class="stat-card"><div class="stat-card-num">${cats.art}</div><div class="stat-card-label">ศิลปะ</div></div>
    `;
  }

  // ===== TABLES =====
  const CAT_LABEL = { design: 'Design', photo: 'Photo', art: 'Art' };
  const CAT_BADGE = { design: 'badge-design', photo: 'badge-photo', art: 'badge-art' };

  function renderDashTable() {
    const works = getWorks().slice(-5).reverse();
    document.getElementById('dash-table-body').innerHTML = works.map(w => `
      <tr>
        <td><div class="td-thumb">${w.image ? `<img src="${w.image}" alt="">` : w.emoji || '✦'}</div></td>
        <td><div class="td-title">${w.title}</div><div class="td-desc">${w.desc}</div></td>
        <td><span class="badge ${CAT_BADGE[w.category] || ''}">${CAT_LABEL[w.category] || w.category}</span></td>
        <td style="color:var(--text-muted);font-size:.8rem;">${w.year || '-'}</td>
      </tr>
    `).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem;font-size:.8rem;letter-spacing:.1em;">— ยังไม่มีผลงาน —</td></tr>';
  }

  function renderTable() {
    const q = (document.getElementById('search-box')?.value || '').toLowerCase();
    let works = getWorks();
    if (q) works = works.filter(w => w.title.toLowerCase().includes(q) || w.desc.toLowerCase().includes(q));
    document.getElementById('works-table-body').innerHTML = works.map(w => `
      <tr>
        <td><div class="td-thumb">${w.image ? `<img src="${w.image}" alt="">` : w.emoji || '✦'}</div></td>
        <td><div class="td-title">${w.title}</div><div class="td-desc">${w.desc}</div></td>
        <td><span class="badge ${CAT_BADGE[w.category] || ''}">${CAT_LABEL[w.category] || w.category}</span></td>
        <td style="color:var(--text-muted);font-size:.8rem;">${w.year || '-'}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-secondary btn-sm" onclick="editWork(${w.id})">แก้ไข</button>
            <button class="btn btn-danger" onclick="deleteWork(${w.id})">ลบ</button>
          </div>
        </td>
      </tr>
    `).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;font-size:.8rem;letter-spacing:.1em;">— ไม่พบผลงาน —</td></tr>';
  }

  // ===== MODAL =====
  let selectedEmoji = '✦';

  function openModal(reset = true) {
    if (reset) {
      document.getElementById('modal-title').textContent = 'เพิ่มผลงาน';
      document.getElementById('edit-id').value = '';
      document.getElementById('f-title').value = '';
      document.getElementById('f-cat').value = 'design';
      document.getElementById('f-year').value = new Date().getFullYear();
      document.getElementById('f-desc').value = '';
      document.getElementById('f-image').value = '';
      selectedEmoji = '✦'; setEmoji('✦');
    }
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  document.querySelectorAll('.emoji-opt').forEach(opt => {
    opt.addEventListener('click', () => setEmoji(opt.dataset.v));
  });

  function setEmoji(v) {
    document.querySelectorAll('.emoji-opt').forEach(o => o.classList.toggle('selected', o.dataset.v === v));
    selectedEmoji = v;
  }

  function saveWork() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { showToast('กรุณากรอกชื่อผลงาน', 'error'); return; }
    const works = getWorks();
    const editId = parseInt(document.getElementById('edit-id').value);
    const work = {
      id: editId || Date.now(), title,
      category: document.getElementById('f-cat').value,
      year: document.getElementById('f-year').value.trim(),
      desc: document.getElementById('f-desc').value.trim(),
      image: document.getElementById('f-image').value.trim(),
      emoji: selectedEmoji,
    };
    if (editId) { const i = works.findIndex(w => w.id === editId); if (i >= 0) works[i] = work; }
    else works.push(work);
    saveWorks(works);
    closeModal();
    renderStats(); renderTable(); renderDashTable();
    showToast(editId ? 'อัพเดตผลงานแล้ว ✓' : 'เพิ่มผลงานใหม่แล้ว ✓', 'success');
  }

  function editWork(id) {
    const w = getWorks().find(x => x.id === id);
    if (!w) return;
    document.getElementById('modal-title').textContent = 'แก้ไขผลงาน';
    document.getElementById('edit-id').value = w.id;
    document.getElementById('f-title').value = w.title;
    document.getElementById('f-cat').value = w.category;
    document.getElementById('f-year').value = w.year || '';
    document.getElementById('f-desc').value = w.desc || '';
    document.getElementById('f-image').value = w.image || '';
    setEmoji(w.emoji || '✦');
    openModal(false);
  }

  function deleteWork(id) {
    if (!confirm('ต้องการลบผลงานนี้ใช่ไหม?')) return;
    const works = getWorks().filter(w => w.id !== id);
    saveWorks(works);
    renderStats(); renderTable(); renderDashTable();
    showToast('ลบผลงานแล้ว', 'success');
  }

  // ===== SETTINGS =====
  function changePassword() {
    const old = document.getElementById('old-pass').value;
    const nw  = document.getElementById('new-pass').value;
    const cf  = document.getElementById('confirm-pass').value;
    const creds = getCreds();
    if (old !== creds.pass) { showToast('รหัสผ่านปัจจุบันไม่ถูกต้อง', 'error'); return; }
    if (nw.length < 6) { showToast('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัว', 'error'); return; }
    if (nw !== cf) { showToast('รหัสผ่านใหม่ไม่ตรงกัน', 'error'); return; }
    localStorage.setItem('admin_creds', JSON.stringify({ user: creds.user, pass: nw }));
    ['old-pass','new-pass','confirm-pass'].forEach(id => document.getElementById(id).value = '');
    showToast('เปลี่ยนรหัสผ่านสำเร็จ ✓', 'success');
  }

  // ===== TOAST =====
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type}`;
    void t.offsetWidth; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />

  <style>
    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 2rem;
      text-align: center;
      background: #fff;
      position: relative;
    }

    /* subtle grid lines background */
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-inner { position: relative; z-index: 1; max-width: 800px; }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: .7rem;
      font-size: 0.68rem; letter-spacing: .26em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 2rem;
      opacity: 0; animation: fadeUp .7s .2s both;
    }
    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: ''; display: block;
      width: 24px; height: 1px; background: currentColor;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(5rem, 14vw, 14rem);
      line-height: .9; letter-spacing: -.01em;
      color: var(--text);
      margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp .9s .35s both;
    }

    .hero-desc {
      font-size: .95rem; color: var(--text-muted);
      line-height: 1.9; font-weight: 300; max-width: 44ch; margin: 0 auto 3rem;
      opacity: 0; animation: fadeUp .8s .5s both;
    }

    .hero-actions {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
      opacity: 0; animation: fadeUp .8s .65s both;
    }

    /* corner marks */
    .corner {
      position: absolute; width: 16px; height: 16px;
      border-color: var(--border2); border-style: solid;
    }
    .corner-tl { top: 2rem; left: 2rem; border-width: 1px 0 0 1px; }
    .corner-tr { top: 2rem; right: 2rem; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 2rem; left: 2rem; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 2rem; right: 2rem; border-width: 0 1px 1px 0; }

    /* scroll indicator */
    .scroll-hint {
      position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      font-size: 0.6rem; letter-spacing: .22em; text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0; animation: fadeUp .6s 1.1s both;
    }
    .scroll-hint-line {
      width: 1px; height: 48px;
      background: linear-gradient(to bottom, transparent, var(--text-muted));
      animation: scrollDrop 2.5s ease-in-out infinite;
    }
    @keyframes scrollDrop {
      0%   { opacity: 0; transform: scaleY(0); transform-origin: top; }
      40%  { opacity: 1; transform: scaleY(1); }
      100% { opacity: 0; transform: scaleY(1); }
    }

    @media (max-width: 600px) {
      .hero-title { font-size: clamp(4rem, 20vw, 8rem); }
      .corner { display: none; }
    }
  </style>
</head>
<body>

<!-- Nav inject point -->
<div id="nav-root"></div>

<!-- Hero -->
<main>
  <section class="hero">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="hero-inner">
      <p class="hero-eyebrow">Welcome</p>
      <h1 class="hero-title">PORTFOLIO</h1>
      <p class="hero-desc">พื้นที่สำหรับรวบรวมผลงาน ความคิด และนวัตกรรม จากทีมนักสร้างสรรค์รุ่นใหม่</p>
      <div class="hero-actions">
        <button class="nav-btn login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
      </div>
    </div>

    <div class="scroll-hint" aria-hidden="true">
      <div class="scroll-hint-line"></div>
    </div>
  </section>
</main>

<!-- Footer inject point -->
<div id="footer-root"></div>

<!-- Shared nav/footer logic -->
<script src="nav.js"></script>

</script>
</body>
</html>
